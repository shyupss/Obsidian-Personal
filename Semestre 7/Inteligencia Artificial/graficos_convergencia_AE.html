
<style>
.tab-btn { background: none; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 6px 16px; font-size: 13px; cursor: pointer; color: var(--color-text-secondary); transition: all .15s; }
.tab-btn.active { background: var(--color-background-secondary); color: var(--color-text-primary); font-weight: 500; border-color: var(--color-border-primary); }
.badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: var(--border-radius-md); font-weight: 500; }
</style>

<div style="display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;">
  <button class="tab-btn active" onclick="setTab(0)">Exceso de explotación</button>
  <button class="tab-btn" onclick="setTab(1)">Exceso de exploración</button>
  <button class="tab-btn" onclick="setTab(2)">Búsqueda balanceada</button>
</div>

<div id="badge-row" style="margin-bottom:12px;"></div>

<div style="position:relative; width:100%; height:280px;">
  <canvas id="convChart"></canvas>
</div>

<div id="insight" style="margin-top:14px; padding:12px 14px; background:var(--color-background-secondary); border-radius:var(--border-radius-md); font-size:13px; color:var(--color-text-secondary); line-height:1.6;"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const GEN = 50;
const labels = Array.from({length: GEN}, (_, i) => i + 1);

function noise(amp) { return (Math.random() - 0.5) * amp; }

function makeOver() {
  const best = [], avg = [];
  for (let i = 0; i < GEN; i++) {
    const b = i < 10 ? 24000 - i * 900 + noise(300) : 15000 + noise(120);
    const a = i < 12 ? 24000 - i * 700 + noise(400) : 14800 + noise(150);
    best.push(Math.round(b));
    avg.push(Math.round(a));
  }
  return { best, avg };
}

function makeExplore() {
  const best = [], avg = [];
  for (let i = 0; i < GEN; i++) {
    const b = 20000 - i * 60 + noise(1200);
    const a = 21000 - i * 20 + noise(1600);
    best.push(Math.round(b));
    avg.push(Math.round(Math.max(a, best[i] + 1000)));
  }
  return { best, avg };
}

function makeBalanced() {
  const best = [], avg = [];
  for (let i = 0; i < GEN; i++) {
    const decay = Math.exp(-i / 18);
    const b = 5200 + 18800 * decay + noise(300 * decay + 100);
    const a = 6500 + 18800 * decay + noise(500 * decay + 200);
    best.push(Math.round(b));
    avg.push(Math.round(Math.max(a, best[i] + 600)));
  }
  return { best, avg };
}

const datasets = [makeOver(), makeExplore(), makeBalanced()];

const configs = [
  {
    label: "Exceso de explotación",
    badge: '<span class="badge" style="background:#FCEBEB;color:#A32D2D;">Convergencia prematura</span>',
    insight: "Best y average colapsan rápido y se aplanan: la población perdió diversidad y quedó atrapada en un óptimo local. La selección presiona demasiado fuerte y elimina soluciones diversas antes de explorar lo suficiente.",
    bestColor: "#E24B4A",
    avgColor: "#F09595"
  },
  {
    label: "Exceso de exploración",
    badge: '<span class="badge" style="background:#FAEEDA;color:#854F0B;">Sin convergencia</span>',
    insight: "Best y average oscilan sin converger: la mutación o la aleatoriedad son demasiado altas y destruyen el progreso acumulado. Las buenas soluciones encontradas son producto del azar, no del aprendizaje.",
    bestColor: "#BA7517",
    avgColor: "#EF9F27"
  },
  {
    label: "Búsqueda balanceada",
    badge: '<span class="badge" style="background:#EAF3DE;color:#3B6D11;">Comportamiento ideal</span>',
    insight: "Best desciende suavemente de forma asintótica. Average lo sigue con distancia, indicando que la población mantiene diversidad. El algoritmo explora al inicio y explota al final, aprovechando bien el cómputo.",
    bestColor: "#1D9E75",
    avgColor: "#9FE1CB"
  }
];

let currentTab = 0;
let chart;

function buildChart(idx) {
  const d = datasets[idx];
  const c = configs[idx];
  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('convChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Best',
          data: d.best,
          borderColor: c.bestColor,
          backgroundColor: 'transparent',
          borderWidth: 2,
          pointRadius: 0,
          tension: 0.4
        },
        {
          label: 'Average',
          data: d.avg,
          borderColor: c.avgColor,
          backgroundColor: 'transparent',
          borderWidth: 1.5,
          borderDash: [5, 4],
          pointRadius: 0,
          tension: 0.4
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y.toLocaleString()
          }
        }
      },
      scales: {
        x: {
          title: { display: true, text: 'Generación', font: { size: 12 }, color: '#888780' },
          ticks: { color: '#888780', font: { size: 11 }, maxTicksLimit: 10 },
          grid: { color: 'rgba(136,135,128,0.15)' }
        },
        y: {
          title: { display: true, text: 'Fitness (menor = mejor)', font: { size: 12 }, color: '#888780' },
          ticks: { color: '#888780', font: { size: 11 }, callback: v => (v/1000).toFixed(0) + 'k' },
          grid: { color: 'rgba(136,135,128,0.15)' }
        }
      }
    }
  });
}

function setTab(idx) {
  currentTab = idx;
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  document.getElementById('badge-row').innerHTML = configs[idx].badge +
    ' <span style="margin-left:8px;font-size:12px;color:var(--color-text-tertiary);">— ' + configs[idx].label + '</span>';
  document.getElementById('insight').innerHTML =
    '<span style="display:inline-flex;gap:6px;align-items:flex-start;">' +
    '<span style="margin-top:2px;font-size:16px;">&#9432;</span>' +
    '<span>' + configs[idx].insight + '</span></span>';
  buildChart(idx);
}

document.getElementById('convChart').parentElement.insertAdjacentHTML('afterend',
  '<div style="display:flex;gap:20px;margin-top:10px;font-size:12px;color:var(--color-text-secondary);">' +
  '<span style="display:flex;align-items:center;gap:5px;"><span style="width:18px;height:2px;background:#444;display:inline-block;"></span> Best</span>' +
  '<span style="display:flex;align-items:center;gap:5px;"><span style="width:18px;height:2px;border-top:2px dashed #888;display:inline-block;"></span> Average</span>' +
  '</div>');

setTab(0);
</script>
